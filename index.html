<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Pro | Ultimate HD Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00e5ff; /* Cyan Neon */
            --secondary: #b900ff; /* Purple Neon */
            --bg-dark: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        
        /* Glassmorphism Navbar */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; letter-spacing: 1px; }
        .insta-link { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 20px; transition: 0.3s; }
        .insta-link:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }

        header { text-align: center; padding: 50px 20px 20px; }
        header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; }
        header p { color: var(--text-muted); font-size: 1.1rem; }
        
        /* Premium Search Bar */
        .search-container { text-align: center; margin: 20px auto 40px; max-width: 650px; padding: 0 20px; }
        .search-box {
            display: flex; background: var(--card-bg); 
            padding: 8px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-box input {
            flex-grow: 1; background: transparent; border: none; color: white;
            padding: 15px 25px; font-size: 1.1rem; outline: none;
        }
        .search-box button {
            background: linear-gradient(90deg, var(--secondary), var(--primary)); 
            border: none; color: white; padding: 0 35px;
            border-radius: 35px; font-weight: 700; cursor: pointer; transition: 0.3s;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .search-box button:hover { opacity: 0.9; transform: scale(0.98); }

        /* Pinterest Style Masonry Grid */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .masonry-grid {
            column-count: 4; column-gap: 20px; margin-bottom: 50px;
        }
        @media (max-width: 1200px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 900px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 600px) { .masonry-grid { column-count: 1; } }

        .card { 
            background: var(--card-bg); border-radius: 16px; overflow: hidden; 
            margin-bottom: 20px; break-inside: avoid;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(0, 229, 255, 0.5); box-shadow: 0 10px 25px rgba(0,0,0,0.8); }
        
        .card img { width: 100%; display: block; object-fit: cover; }
        
        .card-content { padding: 15px; }
        .card h3 { font-size: 0.95rem; margin-bottom: 15px; font-weight: 500; line-height: 1.4; color: #ddd; }
        
        .download-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: white; padding: 10px; border-radius: 8px; font-weight: 600; 
            cursor: pointer; width: 100%; transition: 0.3s; display: flex; justify-content: center; align-items: center; gap: 8px;
        }
        .card:hover .download-btn { background: var(--primary); color: #000; border-color: var(--primary); }

        /* Loader */
        .loader {
            border: 3px solid rgba(255,255,255,0.1); border-top: 3px solid var(--primary);
            border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: none;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .load-more-container { text-align: center; margin-bottom: 80px; }
        .load-more-btn {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 15px 40px; font-size: 1.1rem; font-weight: 700; border-radius: 30px; 
            cursor: pointer; transition: 0.3s; text-transform: uppercase;
        }
        .load-more-btn:hover { background: var(--primary); color: #000; }
        #statusMessage { text-align: center; font-size: 1.1rem; color: var(--text-muted); margin: 20px 0; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Pro</div>
        <a href="https://instagram.com/the_script_7" target="_blank" class="insta-link">@the_script_7</a>
    </nav>

    <header>
        <h1>10,000+ HD Templates</h1>
        <p>Search. Download. Create.</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search any meme (e.g., Cat, Brain, Drake)..." onkeypress="handleEnter(event)">
            <button onclick="searchMemes()">Search</button>
        </div>
    </div>

    <div class="container">
        <div id="statusMessage"></div>
        <div id="meme-grid" class="masonry-grid"></div>
        <div class="load-more-container" id="loadMoreSection" style="display: none;">
            <button class="load-more-btn" id="loadBtn" onclick="fetchMemes()">Load More</button>
        </div>
    </div>

    <script>
        let afterToken = '';
        let isFetching = false;
        let currentQuery = '';

        function handleEnter(e) { if (e.key === 'Enter') searchMemes(); }

        function searchMemes() {
            const input = document.getElementById('searchInput').value.trim();
            currentQuery = input;
            afterToken = ''; 
            document.getElementById('meme-grid').innerHTML = ''; 
            fetchMemes();
        }

        async function fetchMemes() {
            if (isFetching) return;
            isFetching = true;
            
            const status = document.getElementById('statusMessage');
            const loadBtn = document.getElementById('loadBtn');
            const grid = document.getElementById('meme-grid');
            
            status.innerText = "Fetching HD Templates...";
            if(afterToken !== '') loadBtn.innerText = "Loading...";

            try {
                let apiUrl = `https://www.reddit.com/r/MemeTemplatesOfficial/hot.json?limit=50&after=${afterToken}`;
                if (currentQuery !== '') {
                    apiUrl = `https://www.reddit.com/r/MemeTemplatesOfficial/search.json?q=${encodeURIComponent(currentQuery)}&restrict_sr=1&limit=50&after=${afterToken}`;
                }

                const response = await fetch(apiUrl);
                const data = await response.json();
                
                afterToken = data.data.after; 
                const posts = data.data.children;
                let htmlContent = '';

                posts.forEach(post => {
                    const postData = post.data;
                    let imageUrl = postData.url;
                    
                    if (imageUrl && (imageUrl.includes('.jpg') || imageUrl.includes('.png') || imageUrl.includes('.jpeg'))) {
                        let title = postData.title;
                        if(title.length > 60) title = title.substring(0, 60) + "...";

                        htmlContent += `
                        <div class="card">
                            <img src="${imageUrl}" loading="lazy">
                            <div class="card-content">
                                <h3>${title}</h3>
                                <button onclick="masterDownload('${imageUrl}', 'MemeHub_${postData.id}.jpg', this)" class="download-btn">
                                    <div class="loader"></div> <span class="btn-text">Download HD</span>
                                </button>
                            </div>
                        </div>`;
                    }
                });

                if (htmlContent === '' && afterToken === null) {
                    status.innerText = "No more templates found!";
                    document.getElementById('loadMoreSection').style.display = 'none';
                } else {
                    grid.innerHTML += htmlContent;
                    status.innerText = "";
                    document.getElementById('loadMoreSection').style.display = 'block';
                }

            } catch (error) {
                status.innerText = "Connection error. Please check your internet.";
            } finally {
                isFetching = false;
                loadBtn.innerText = "Load More Templates";
            }
        }

        // ==========================================
        // THE ULTIMATE PROXY WATERFALL DOWNLOADER
        // ==========================================
        async function masterDownload(imageUrl, filename, btnElement) {
            const btnText = btnElement.querySelector('.btn-text');
            const loader = btnElement.querySelector('.loader');
            
            // UI Change to Loading
            btnText.innerText = "Saving...";
            loader.style.display = "block";
            btnElement.style.pointerEvents = "none";

            // 3 Premium Proxies to bypass GitHub CORS restrictions
            const proxies = [
                `https://api.allorigins.win/raw?url=${encodeURIComponent(imageUrl)}`,
                `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(imageUrl)}`,
                `https://corsproxy.io/?${encodeURIComponent(imageUrl)}`
            ];

            let success = false;

            for (let proxy of proxies) {
                try {
                    const response = await fetch(proxy);
                    if (!response.ok) continue; // Agar proxy fail hui toh agli par jao
                    
                    const blob = await response.blob();
                    const blobUrl = window.URL.createObjectURL(blob);
                    
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = blobUrl;
                    a.download = filename;
                    document.body.appendChild(a);
                    a.click();
                    
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(blobUrl);
                    
                    success = true;
                    break; // File download ho gayi, loop band karo
                } catch (e) {
                    console.log("Proxy failed, trying next...");
                }
            }

            // Agar teeno proxy fail ho jayein ya user Instagram ke browser mein ho
            if (!success) {
                alert("Direct download blocked by your browser security. Opening image in new tab. Long-press to save it!");
                window.open(imageUrl, '_blank');
            }

            // Reset UI
            btnText.innerText = success ? "Downloaded!" : "Download HD";
            loader.style.display = "none";
            btnElement.style.pointerEvents = "auto";
            
            if(success){
                setTimeout(() => { btnText.innerText = "Download HD"; }, 2000);
            }
        }

        // Load first batch
        fetchMemes();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Ultra | Infinite Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ff88;
            --secondary: #00d2ff;
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --text-main: #ffffff;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        /* Premium Navbar */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(9, 9, 11, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        .insta-btn { background: transparent; border: 1px solid var(--primary); color: var(--primary); padding: 8px 18px; border-radius: 25px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .insta-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(0,255,136,0.4); }

        header { text-align: center; padding: 100px 20px 30px; }
        header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        header p { color: #a1a1aa; font-size: 1.1rem; }

        /* Smooth Categories */
        .category-wrapper { position: sticky; top: 70px; z-index: 999; background: var(--bg-dark); padding: 15px 0; border-bottom: 1px solid var(--border); }
        .categories { display: flex; gap: 15px; overflow-x: auto; max-width: 1200px; margin: 0 auto; padding: 0 20px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-bg); color: #fff; border: 1px solid var(--border); padding: 10px 25px; border-radius: 30px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; }
        .cat-btn:hover { border-color: var(--secondary); }
        .cat-btn.active { background: linear-gradient(90deg, var(--primary), var(--secondary)); color: #000; border: none; box-shadow: 0 5px 15px rgba(0,210,255,0.3); }

        /* Masonry Grid */
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .grid { column-count: 4; column-gap: 20px; }
        @media (max-width: 1200px) { .grid { column-count: 3; } }
        @media (max-width: 900px) { .grid { column-count: 2; } }
        @media (max-width: 600px) { .grid { column-count: 1; } }

        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; margin-bottom: 20px; break-inside: avoid; border: 1px solid var(--border); transition: transform 0.3s; cursor: pointer; position: relative; }
        .card:hover { transform: translateY(-7px); border-color: var(--secondary); }
        .card img, .card video { width: 100%; display: block; object-fit: cover; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: rgba(255,255,255,0.8); pointer-events: none; }
        .card-content { padding: 15px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); position: absolute; bottom: 0; width: 100%; }
        .card h3 { font-size: 0.95rem; font-weight: 600; color: #fff; text-shadow: 1px 1px 3px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;}

        /* Loading Spinner */
        .loader-container { text-align: center; padding: 40px; }
        .spinner { width: 40px; height: 40px; border: 4px solid var(--border); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Fullscreen Preview Modal */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; opacity: 0; transition: opacity 0.3s; }
        .modal.show { display: flex; opacity: 1; }
        .close-modal { position: absolute; top: 20px; right: 30px; font-size: 2.5rem; color: #fff; cursor: pointer; font-weight: bold; }
        .modal-content { max-width: 90%; max-height: 70vh; border-radius: 10px; box-shadow: 0 0 30px rgba(0,255,136,0.2); }
        .modal-title { color: #fff; margin: 20px 0; font-size: 1.2rem; text-align: center; }
        
        .modal-actions { display: flex; gap: 15px; margin-top: 10px; }
        .action-btn { padding: 12px 30px; border-radius: 30px; font-weight: 800; cursor: pointer; border: none; font-size: 1rem; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .btn-download { background: var(--primary); color: #000; }
        .btn-download:hover { background: #00cc6a; transform: scale(1.05); }
        .btn-share { background: #27272a; color: #fff; border: 1px solid #3f3f46; }
        .btn-share:hover { background: #3f3f46; }

    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Ultra</div>
        <a href="https://instagram.com/the_script_7" target="_blank" class="insta-btn">@the_script_7</a>
    </nav>

    <header>
        <h1>Unlimited Creation</h1>
        <p>Infinite Scroll. Video Templates. One-Click Share.</p>
    </header>

    <div class="category-wrapper">
        <div class="categories">
            <button class="cat-btn active" onclick="switchCategory('MemeTemplatesOfficial', 'image', this)">🔥 Trending</button>
            <button class="cat-btn" onclick="switchCategory('IndianMemeTemplates', 'image', this)">🇮🇳 Indian</button>
            <button class="cat-btn" onclick="switchCategory('gamingmemes', 'image', this)">🎮 Gaming</button>
            <button class="cat-btn" onclick="switchCategory('videos', 'video', this)">🎬 HD Videos</button>
        </div>
    </div>

    <div class="container">
        <div id="meme-grid" class="grid"></div>
        <div class="loader-container" id="loaderSection">
            <div class="spinner"></div>
            <p style="margin-top: 15px; color: var(--primary);">Fetching new templates...</p>
        </div>
    </div>

    <div class="modal" id="previewModal">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div id="modalMediaContainer"></div>
        <h3 class="modal-title" id="modalTitle">Meme Title</h3>
        <div class="modal-actions">
            <button class="action-btn btn-share" id="shareBtn" onclick="shareTemplate()">📤 Share</button>
            <button class="action-btn btn-download" id="downloadBtn" onclick="downloadTemplate()">⬇ Download Free</button>
        </div>
    </div>

    <script>
        const grid = document.getElementById('meme-grid');
        const loader = document.getElementById('loaderSection');
        const modal = document.getElementById('previewModal');
        
        let currentMode = 'image'; // 'image' or 'video'
        let currentSubreddit = 'MemeTemplatesOfficial';
        let isFetching = false;
        let currentPreviewUrl = '';
        let currentPreviewTitle = '';

        // =====================================
        // PRO VIDEO DATABASE (Add Unlimited Links Here)
        // =====================================
        const videoDatabase = [
            { name: "GTA 5 Wasted Green Screen", url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/friday.mp4" },
            { name: "Sigma Male Grindset Patrick Bateman", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { name: "Sad Cat Crying Template", url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/friday.mp4" },
            { name: "Thug Life Deal With It", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { name: "Disaster Girl Fire Background", url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/friday.mp4" }
        ];

        // --- 1. INFINITE SCROLL API LOGIC ---
        // Meme-api.com returns totally random images every time we call it. No token needed!
        async function fetchImages() {
            if (isFetching) return;
            isFetching = true;
            loader.style.display = 'block';

            try {
                // Fetch 20 random templates at a time from selected category
                const response = await fetch(`https://meme-api.com/gimme/${currentSubreddit}/20`);
                const data = await response.json();
                
                let html = '';
                data.memes.forEach(meme => {
                    if (meme.url.match(/\.(jpeg|jpg|png)$/)) {
                        // Title safe escape
                        const safeTitle = meme.title.replace(/'/g, "\\'");
                        html += `
                        <div class="card" onclick="openModal('${meme.url}', '${safeTitle}', 'image')">
                            <img src="${meme.url}" loading="lazy" alt="${meme.title}">
                            <div class="card-content">
                                <h3>${meme.title}</h3>
                            </div>
                        </div>`;
                    }
                });
                grid.innerHTML += html;
            } catch (error) {
                console.error("API Limit reached, retrying...");
            } finally {
                isFetching = false;
            }
        }

        function loadVideos() {
            grid.innerHTML = '';
            let html = '';
            videoDatabase.forEach(vid => {
                const safeTitle = vid.name.replace(/'/g, "\\'");
                html += `
                <div class="card" onclick="openModal('${vid.url}', '${safeTitle}', 'video')">
                    <video src="${vid.url}" muted preload="metadata"></video>
                    <div class="play-icon">▶</div>
                    <div class="card-content">
                        <h3>${vid.name}</h3>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
            loader.style.display = 'none'; // Videos are local, no infinite scroll needed yet
        }

        function switchCategory(target, mode, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            currentMode = mode;
            currentSubreddit = target;
            grid.innerHTML = '';
            
            if (mode === 'image') {
                loader.style.display = 'block';
                fetchImages();
            } else {
                loadVideos();
            }
        }

        // --- 2. INFINITE SCROLL OBSERVER (Auto Load on scroll) ---
        window.addEventListener('scroll', () => {
            if (currentMode === 'image') {
                const { scrollTop, scrollHeight, clientHeight } = document.documentElement;
                // Agar user page ke aakhiri 200px tak pahuch gaya hai, toh aur load karo
                if (scrollTop + clientHeight >= scrollHeight - 200) {
                    fetchImages();
                }
            }
        });

        // --- 3. LIVE PREVIEW MODAL ---
        function openModal(url, title, type) {
            currentPreviewUrl = url;
            currentPreviewTitle = title;
            document.getElementById('modalTitle').innerText = title;
            
            const mediaContainer = document.getElementById('modalMediaContainer');
            if (type === 'image') {
                mediaContainer.innerHTML = `<img src="${url}" class="modal-content" alt="Preview">`;
            } else {
                mediaContainer.innerHTML = `<video src="${url}" class="modal-content" controls autoplay loop></video>`;
            }
            
            modal.classList.add('show');
            document.body.style.overflow = 'hidden'; // Pichhe ka scroll band kar do
        }

        function closeModal() {
            modal.classList.remove('show');
            document.getElementById('modalMediaContainer').innerHTML = ''; // Video audio stop karne ke liye
            document.body.style.overflow = 'auto';
        }

        // Modal ke bahar click karne par band hona
        modal.addEventListener('click', (e) => {
            if (e.target === modal) closeModal();
        });

        // --- 4. ADVANCED DOWNLOAD & SHARE ---
        async function downloadTemplate() {
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerText;
            btn.innerText = "⏳ Saving...";
            
            // Generate filename
            const ext = currentMode === 'image' ? '.jpg' : '.mp4';
            const filename = currentPreviewTitle.substring(0, 15).replace(/[^a-z0-9]/gi, '_').toLowerCase() + ext;

            try {
                // Try blob fetch first (cleanest download)
                const res = await fetch(currentPreviewUrl);
                const blob = await res.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                btn.innerText = "✅ Saved!";
            } catch (err) {
                // Agar cross-origin block hota hai, toh sidha open in new tab karo (100% working fallback)
                window.open(currentPreviewUrl, '_blank');
                btn.innerText = "Opened securely!";
            }
            
            setTimeout(() => { btn.innerText = originalText; }, 2000);
        }

        async function shareTemplate() {
            const btn = document.getElementById('shareBtn');
            // Web Share API (Works awesome on mobile devices)
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: currentPreviewTitle,
                        text: 'Found this dope template on MemeHub Pro 🔥',
                        url: currentPreviewUrl
                    });
                } catch (err) {
                    console.log("Share cancelled");
                }
            } else {
                // Fallback copy to clipboard
                navigator.clipboard.writeText(currentPreviewUrl);
                btn.innerText = "✅ Link Copied!";
                setTimeout(() => { btn.innerText = "📤 Share"; }, 2000);
            }
        }

        // Initialize First Load
        fetchImages();
    </script>
</body>
</html>

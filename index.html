<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Pro | Images & Videos</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00ffcc; /* Mint Neon */
            --secondary: #7000ff; /* Deep Purple */
            --bg-main: #0a0a0a;
            --card-bg: #151515;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255,255,255,0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-main); }
        
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        .insta-link { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; border: 1px solid var(--border-color); padding: 6px 16px; border-radius: 20px; transition: 0.3s; }
        .insta-link:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }

        header { text-align: center; padding: 30px 20px 10px; }
        header h1 { font-size: 2.2rem; font-weight: 800; margin-bottom: 10px; }
        
        .search-container { text-align: center; margin: 10px auto 20px; max-width: 650px; padding: 0 20px; }
        .search-box {
            display: flex; background: var(--card-bg); padding: 5px; border-radius: 40px; 
            border: 1px solid var(--border-color);
        }
        .search-box input {
            flex-grow: 1; background: transparent; border: none; color: white;
            padding: 12px 20px; font-size: 1rem; outline: none;
        }

        /* Fast Category Buttons */
        .categories {
            display: flex; gap: 10px; padding: 10px 20px; margin-bottom: 20px;
            overflow-x: auto; max-width: 1400px; margin-left: auto; margin-right: auto;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border-color);
            padding: 10px 20px; border-radius: 25px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn.active { background: rgba(0, 255, 204, 0.1); color: var(--primary); border-color: var(--primary); }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-bottom: 50px; }
        
        .card { 
            background: var(--card-bg); border-radius: 12px; overflow: hidden; 
            border: 1px solid var(--border-color); transition: 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .card img, .card video { width: 100%; height: 250px; object-fit: contain; background: #000; display: block; }
        
        .card-content { padding: 15px; text-align: center; }
        .card h3 { font-size: 0.95rem; margin-bottom: 15px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        
        .download-btn { 
            background: var(--primary); color: #000; border: none; 
            padding: 10px; border-radius: 8px; font-weight: 700; 
            cursor: pointer; width: 100%; transition: 0.3s;
        }
        .download-btn:hover { background: #00ccaa; }
        .video-btn { background: var(--secondary); color: white; }
        .video-btn:hover { background: #5500cc; }

        #statusMessage { text-align: center; font-size: 1.1rem; color: var(--primary); margin: 20px 0; font-weight: bold; }
        .loader { display: none; margin: 30px auto; width: 40px; height: 40px; border: 4px solid var(--border-color); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Pro</div>
        <a href="https://instagram.com/the_script_7" target="_blank" class="insta-link">@the_script_7</a>
    </nav>

    <header>
        <h1>Next-Gen Templates</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search templates instantly..." onkeyup="searchLocal()">
        </div>
    </div>

    <div class="categories">
        <button class="cat-btn active" onclick="loadCategory('trending', this)">🔥 Top Trending</button>
        <button class="cat-btn" onclick="loadCategory('indian', this)">🇮🇳 Indian Memes</button>
        <button class="cat-btn" onclick="loadCategory('gaming', this)">🎮 Gaming</button>
        <button class="cat-btn" onclick="loadCategory('videos', this)">🎬 Video Templates</button>
    </div>

    <div class="container">
        <div class="loader" id="mainLoader"></div>
        <div id="statusMessage"></div>
        <div id="meme-grid" class="grid"></div>
    </div>

    <script>
        let currentMemes = []; // Search filter karne ke liye
        const grid = document.getElementById('meme-grid');
        const loader = document.getElementById('mainLoader');
        const status = document.getElementById('statusMessage');

        // =====================================
        // BHAI YAHAN APNE VIDEO LINKS DAALNA 
        // =====================================
        // Maine demo ke liye 4 working mp4 links daale hain.
        // Tu Github/Google Drive par video daal kar unka link yahan chipka sakta hai.
        const videoTemplatesData = [
            { name: "GTA Wasted Green Screen", url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/friday.mp4" },
            { name: "Sad Cat Crying (Video)", url: "https://www.w3schools.com/html/mov_bbb.mp4" },
            { name: "Sigma Male Grindset", url: "https://interactive-examples.mdn.mozilla.net/media/cc0-videos/friday.mp4" },
            { name: "Thug Life Glasses Drop", url: "https://www.w3schools.com/html/mov_bbb.mp4" }
        ];

        // Button highlight logic
        function updateActiveButton(btnElement) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            document.getElementById('searchInput').value = ''; // Search clear kar do
        }

        // Fast Category Loader (No Proxy, Direct API)
        async function loadCategory(type, btnElement) {
            updateActiveButton(btnElement);
            grid.innerHTML = '';
            status.innerText = '';
            loader.style.display = 'block';

            try {
                if (type === 'trending') {
                    // Sabse Fast aur Reliable API (Imgflip)
                    const res = await fetch('https://api.imgflip.com/get_memes');
                    const data = await res.json();
                    currentMemes = data.data.memes;
                    renderImages(currentMemes);
                } 
                else if (type === 'indian') {
                    // Naya API System (meme-api.com) - Reddit ki CORS problem isme nahi aati
                    const res = await fetch('https://meme-api.com/gimme/IndianMemeTemplates/30');
                    const data = await res.json();
                    currentMemes = data.memes.map(m => ({ name: m.title, url: m.url }));
                    renderImages(currentMemes);
                }
                else if (type === 'gaming') {
                    const res = await fetch('https://meme-api.com/gimme/gamingmemes/30');
                    const data = await res.json();
                    currentMemes = data.memes.map(m => ({ name: m.title, url: m.url }));
                    renderImages(currentMemes);
                }
                else if (type === 'videos') {
                    // Load Local Videos instantly
                    currentMemes = videoTemplatesData;
                    renderVideos(currentMemes);
                }
            } catch (error) {
                status.innerText = "Error loading templates. Check connection.";
            } finally {
                loader.style.display = 'none';
            }
        }

        // Render Images to HTML
        function renderImages(memesArray) {
            grid.innerHTML = '';
            if (memesArray.length === 0) {
                status.innerText = "No templates found.";
                return;
            }
            let html = '';
            memesArray.forEach(meme => {
                if(meme.url.includes('.jpg') || meme.url.includes('.png')) {
                    html += `
                    <div class="card">
                        <img src="${meme.url}" loading="lazy">
                        <div class="card-content">
                            <h3>${meme.name}</h3>
                            <button onclick="downloadFile('${meme.url}')" class="download-btn">DOWNLOAD HD</button>
                        </div>
                    </div>`;
                }
            });
            grid.innerHTML = html;
        }

        // Render Videos to HTML
        function renderVideos(videoArray) {
            grid.innerHTML = '';
            let html = '';
            videoArray.forEach(vid => {
                html += `
                <div class="card">
                    <video src="${vid.url}" controls preload="metadata"></video>
                    <div class="card-content">
                        <h3>${vid.name}</h3>
                        <button onclick="downloadFile('${vid.url}')" class="download-btn video-btn">DOWNLOAD VIDEO</button>
                    </div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        // Instant Local Search
        function searchLocal() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = currentMemes.filter(meme => meme.name.toLowerCase().includes(query));
            
            // Check agar abhi video mode on hai ya image mode
            const isVideoMode = document.querySelector('.cat-btn.active').innerText.includes("Video");
            
            if (isVideoMode) {
                renderVideos(filtered);
            } else {
                renderImages(filtered);
            }
        }

        // Super Fast Download (Opens in new tab automatically so browser doesn't block)
        function downloadFile(url) {
            window.open(url, '_blank');
        }

        // Page khulte hi Top Trending load karo
        loadCategory('trending', document.querySelector('.cat-btn'));
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Pro | HD Blank Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #7928ca;
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }
        
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; background: linear-gradient(to right, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        .insta-link { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); padding: 5px 15px; border-radius: 20px; transition: 0.3s; }
        .insta-link:hover { background: rgba(255,255,255,0.1); }

        header { text-align: center; padding: 60px 20px 40px; }
        header h1 { font-size: 3rem; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        header p { font-size: 1.1rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 50px; }
        .card { 
            background: var(--card-bg); border-radius: 16px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--primary); }
        
        .image-container { position: relative; width: 100%; padding-top: 100%; background: #000; overflow: hidden; }
        .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        
        .card-content { padding: 20px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .card h3 { font-size: 1rem; margin-bottom: 15px; font-weight: 600; color: #fff; height: 3rem; overflow: hidden; }
        
        .download-btn { 
            background: linear-gradient(135deg, var(--primary), var(--secondary)); 
            border: none; color: white; padding: 12px; border-radius: 10px; 
            font-weight: 600; font-size: 0.9rem; cursor: pointer; width: 100%;
            text-transform: uppercase;
        }

        .load-more-container { text-align: center; margin-bottom: 60px; }
        .load-more-btn {
            background: #fff; color: #000; border: none; padding: 15px 40px; 
            font-size: 1.1rem; font-weight: 800; border-radius: 30px; cursor: pointer;
        }

        #statusMessage { text-align: center; font-size: 1.2rem; color: var(--primary); margin: 20px 0; }

        footer { border-top: 1px solid rgba(255,255,255,0.05); padding: 40px 20px; text-align: center; background: #000; }
        .footer-links { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .footer-links a { color: var(--text-muted); text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Pro</div>
        <a href="https://instagram.com/meme_editer9" target="_blank" class="insta-link">@the_script_7</a>
    </nav>

    <header>
        <h1>Premium HD Templates</h1>
        <p>Directly download top trending blank meme formats in HD.</p>
    </header>

    <div class="container">
        <div id="statusMessage">Fetching Templates...</div>
        <div id="meme-grid" class="grid"></div>
        <div class="load-more-container" id="loadMoreSection" style="display: none;">
            <button class="load-more-btn" onclick="showMoreMemes()">Load More</button>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#">Privacy</a> <a href="#">Terms</a> <a href="#">Contact</a>
        </div>
        <p>&copy; 2026 MemeHub Pro.</p>
    </footer>

    <script>
        let allMemesData = [];
        let currentIndex = 0;
        const memesPerPage = 20;

        async function fetchInitialMemes() {
            try {
                const response = await fetch('https://api.imgflip.com/get_memes');
                const data = await response.json();
                if (data.success) {
                    allMemesData = data.data.memes;
                    document.getElementById('statusMessage').style.display = 'none';
                    document.getElementById('loadMoreSection').style.display = 'block';
                    showMoreMemes();
                }
            } catch (error) {
                document.getElementById('statusMessage').innerText = "Connection Error!";
            }
        }

        function showMoreMemes() {
            const grid = document.getElementById('meme-grid');
            const nextMemes = allMemesData.slice(currentIndex, currentIndex + memesPerPage);
            
            nextMemes.forEach(meme => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <div class="image-container"><img src="${meme.url}" loading="lazy"></div>
                    <div class="card-content">
                        <h3>${meme.name}</h3>
                        <button onclick="forceDownload('${meme.url}', '${meme.name}.jpg', this)" class="download-btn">Download HD</button>
                    </div>
                `;
                grid.appendChild(card);
            });
            currentIndex += memesPerPage;
            if (currentIndex >= allMemesData.length) document.getElementById('loadMoreSection').style.display = 'none';
        }

        // ==========================================
        // 100% DIRECT DOWNLOAD LOGIC (BLOB METHOD)
        // ==========================================
        async function forceDownload(url, filename, btn) {
            const originalText = btn.innerText;
            btn.innerText = "⏳ SAVING...";
            btn.disabled = true;

            try {
                // Image data fetch karna
                const response = await fetch(url);
                const blob = await response.blob(); // Binary data mein convert karna
                const blobUrl = window.URL.createObjectURL(blob);

                // Hidden link banakar click karna (Forced Download)
                const link = document.createElement('a');
                link.href = blobUrl;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                
                // Cleanup
                document.body.removeChild(link);
                window.URL.revokeObjectURL(blobUrl);
                btn.innerText = originalText;
                btn.disabled = false;
            } catch (error) {
                console.log("Download failed, opening tab as fallback");
                window.open(url, '_blank'); // Agar security block hui toh tab khulega
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        fetchInitialMemes();
    </script>
</body>
</html>

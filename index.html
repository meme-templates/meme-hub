<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Pro | HD Blank Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #7928ca;
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --text-main: #f4f4f5;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; }
        
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(9, 9, 11, 0.8);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 5%;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .insta-link { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; }

        header { text-align: center; padding: 40px 20px 20px; }
        header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        
        /* Search Bar Design */
        .search-container { text-align: center; margin: 20px auto 40px; max-width: 600px; padding: 0 20px; }
        .search-box {
            display: flex; gap: 10px; background: var(--card-bg); 
            padding: 5px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1);
        }
        .search-box input {
            flex-grow: 1; background: transparent; border: none; color: white;
            padding: 15px 20px; font-size: 1rem; outline: none;
        }
        .search-box button {
            background: var(--primary); border: none; color: white; padding: 0 25px;
            border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .search-box button:hover { background: #e60073; }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; margin-bottom: 50px; }
        .card { 
            background: var(--card-bg); border-radius: 16px; overflow: hidden; 
            border: 1px solid rgba(255,255,255,0.05); display: flex; flex-direction: column;
        }
        .image-container { position: relative; width: 100%; padding-top: 100%; background: #000; }
        .card img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
        .card-content { padding: 20px; text-align: center; }
        .card h3 { font-size: 1rem; margin-bottom: 15px; height: 3rem; overflow: hidden; }
        
        .download-btn { 
            background: var(--primary); border: none; color: white; padding: 12px; 
            border-radius: 10px; font-weight: 600; cursor: pointer; width: 100%; transition: 0.3s;
        }

        .load-more-container { text-align: center; margin-bottom: 60px; }
        .load-more-btn {
            background: white; color: black; border: none; padding: 15px 40px; 
            font-size: 1.1rem; font-weight: 800; border-radius: 30px; cursor: pointer;
        }
        #statusMessage { text-align: center; font-size: 1.2rem; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Pro</div>
        <a href="https://instagram.com/the_script_7" target="_blank" class="insta-link">@the_script_7</a>
    </nav>

    <header>
        <h1>Unlimited HD Templates</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search templates (e.g., Drake, Cat)..." onkeypress="handleEnter(event)">
            <button onclick="searchMemes()">Search</button>
        </div>
    </div>

    <div class="container">
        <div id="statusMessage"></div>
        <div id="meme-grid" class="grid"></div>
        <div class="load-more-container" id="loadMoreSection" style="display: none;">
            <button class="load-more-btn" id="loadBtn" onclick="fetchMemes()">Load More</button>
        </div>
    </div>

    <script>
        let afterToken = '';
        let isFetching = false;
        let currentQuery = '';

        function handleEnter(e) {
            if (e.key === 'Enter') searchMemes();
        }

        function searchMemes() {
            const input = document.getElementById('searchInput').value.trim();
            currentQuery = input;
            afterToken = ''; 
            document.getElementById('meme-grid').innerHTML = ''; 
            fetchMemes();
        }

        async function fetchMemes() {
            if (isFetching) return;
            isFetching = true;
            
            const status = document.getElementById('statusMessage');
            const loadBtn = document.getElementById('loadBtn');
            const grid = document.getElementById('meme-grid');
            
            status.innerText = "Fetching Templates...";
            status.style.display = 'block';
            if(afterToken !== '') loadBtn.innerText = "Loading...";

            try {
                let apiUrl = `https://www.reddit.com/r/MemeTemplatesOfficial/hot.json?limit=50&after=${afterToken}`;
                if (currentQuery !== '') {
                    apiUrl = `https://www.reddit.com/r/MemeTemplatesOfficial/search.json?q=${encodeURIComponent(currentQuery)}&restrict_sr=1&limit=50&after=${afterToken}`;
                }

                const response = await fetch(apiUrl);
                const data = await response.json();
                
                afterToken = data.data.after; 
                const posts = data.data.children;
                let htmlContent = '';

                posts.forEach(post => {
                    const postData = post.data;
                    let imageUrl = postData.url;
                    
                    if (imageUrl && (imageUrl.includes('.jpg') || imageUrl.includes('.png') || imageUrl.includes('.jpeg'))) {
                        let title = postData.title;
                        if(title.length > 55) title = title.substring(0, 55) + "...";

                        htmlContent += `
                        <div class="card">
                            <div class="image-container">
                                <img src="${imageUrl}" loading="lazy">
                            </div>
                            <div class="card-content">
                                <h3>${title}</h3>
                                <button onclick="forceDownload('${imageUrl}', 'MemeHub_${postData.id}.jpg', this)" class="download-btn">DOWNLOAD HD</button>
                            </div>
                        </div>`;
                    }
                });

                if (htmlContent === '' && afterToken === null) {
                    status.innerText = "No more templates found!";
                    document.getElementById('loadMoreSection').style.display = 'none';
                } else {
                    grid.innerHTML += htmlContent;
                    status.style.display = 'none';
                    document.getElementById('loadMoreSection').style.display = 'block';
                }

            } catch (error) {
                status.innerText = "Error fetching templates. Please try again.";
            } finally {
                isFetching = false;
                loadBtn.innerText = "Load More";
            }
        }

        // ==========================================
        // 100% DIRECT DOWNLOAD (Image Proxy Hack)
        // ==========================================
        async function forceDownload(imageUrl, filename, btnElement) {
            const originalText = btnElement.innerText;
            btnElement.innerText = "⏳ SAVING...";
            btnElement.style.opacity = "0.7";

            try {
                // wsrv.nl ek special image proxy hai jo Reddit ke blocks hata deti hai
                const proxyUrl = 'https://wsrv.nl/?url=' + encodeURIComponent(imageUrl);
                
                const response = await fetch(proxyUrl);
                if (!response.ok) throw new Error("Download Error");
                
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                // Force Download trigger karna
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                // Memory Cleanup
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
                
                btnElement.innerText = "✅ DONE!";
                setTimeout(() => { btnElement.innerText = originalText; }, 2000);
                
            } catch (error) {
                console.error("Direct download blocked by browser:", error);
                window.open(imageUrl, '_blank');
                btnElement.innerText = originalText;
            } finally {
                btnElement.style.opacity = "1";
            }
        }

        fetchMemes();
    </script>
</body>
</html>

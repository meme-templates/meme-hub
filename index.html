<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Pro | Premium Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Dark Theme (Default) */
            --primary: #00e5ff; 
            --secondary: #b900ff; 
            --bg-main: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-color: rgba(255,255,255,0.05);
            --toast-bg: #222;
        }

        [data-theme="light"] {
            /* Light Theme */
            --bg-main: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #111111;
            --text-muted: #555555;
            --border-color: rgba(0,0,0,0.1);
            --toast-bg: #fff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-main); color: var(--text-main); }
        
        /* Navbar & Theme Toggle */
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(var(--bg-main), 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border-color);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; letter-spacing: 1px; }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .theme-btn { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-main); padding: 8px 12px; border-radius: 20px; cursor: pointer; font-weight: bold; }
        .insta-link { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; border: 1px solid var(--border-color); padding: 6px 16px; border-radius: 20px; }
        
        header { text-align: center; padding: 40px 20px 10px; }
        header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        
        /* Search Box */
        .search-container { text-align: center; margin: 10px auto 20px; max-width: 650px; padding: 0 20px; }
        .search-box {
            display: flex; background: var(--card-bg); padding: 8px; border-radius: 40px; 
            border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .search-box input {
            flex-grow: 1; background: transparent; border: none; color: var(--text-main);
            padding: 12px 20px; font-size: 1rem; outline: none;
        }
        .search-box button {
            background: linear-gradient(90deg, var(--secondary), var(--primary)); border: none; color: white; padding: 0 30px;
            border-radius: 35px; font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        /* Upgraded Horizontal Categories */
        .categories {
            display: flex; gap: 12px; padding: 10px 20px; margin-bottom: 30px;
            overflow-x: auto; max-width: 1400px; margin-left: auto; margin-right: auto;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--card-bg); color: var(--text-muted); border: 1px solid var(--border-color);
            padding: 10px 20px; border-radius: 25px; font-weight: 600; cursor: pointer; white-space: nowrap; font-size: 0.9rem;
        }
        .cat-btn.active { background: rgba(0, 229, 255, 0.1); color: var(--primary); border-color: var(--primary); }

        /* Masonry Grid */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .masonry-grid { column-count: 4; column-gap: 20px; margin-bottom: 50px; }
        @media (max-width: 1200px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 900px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 600px) { .masonry-grid { column-count: 1; } }

        .card { 
            background: var(--card-bg); border-radius: 16px; overflow: hidden; 
            margin-bottom: 20px; break-inside: avoid; border: 1px solid var(--border-color);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .card img { width: 100%; display: block; object-fit: cover; }
        .card-content { padding: 15px; }
        .card h3 { font-size: 0.9rem; margin-bottom: 15px; font-weight: 600; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        
        .action-buttons { display: flex; gap: 10px; }
        .download-btn { 
            background: rgba(136, 136, 136, 0.1); border: 1px solid var(--border-color); 
            color: var(--text-main); padding: 10px; border-radius: 8px; font-weight: 600; 
            cursor: pointer; flex-grow: 1; font-size: 0.85rem;
        }
        .copy-btn {
            background: transparent; border: 1px solid var(--border-color); color: var(--text-main);
            padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem;
        }
        .card:hover .download-btn { background: var(--primary); color: #000; border-color: var(--primary); }
        .card:hover .copy-btn:hover { background: var(--secondary); color: #fff; border-color: var(--secondary); }

        .load-more-container { text-align: center; margin-bottom: 80px; }
        .load-more-btn {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 15px 40px; font-size: 1.1rem; font-weight: 700; border-radius: 30px; cursor: pointer;
        }

        /* Toast Notification System */
        #toast {
            visibility: hidden; min-width: 250px; background-color: var(--toast-bg); color: var(--text-main);
            text-align: center; border-radius: 30px; padding: 16px; position: fixed; z-index: 1001;
            left: 50%; bottom: 30px; font-size: 1rem; font-weight: 600; transform: translateX(-50%);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border-color);
        }
        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @keyframes fadein { from { bottom: 0; opacity: 0; } to { bottom: 30px; opacity: 1; } }
        @keyframes fadeout { from { bottom: 30px; opacity: 1; } to { bottom: 0; opacity: 0; } }

        /* Loader */
        .page-loader { display: none; margin: 50px auto; width: 40px; height: 40px; border: 4px solid var(--border-color); border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Pro</div>
        <div class="nav-actions">
            <button class="theme-btn" onclick="toggleTheme()">🌓 Theme</button>
            <a href="https://instagram.com/the_script_7" target="_blank" class="insta-link">@the_script_7</a>
        </div>
    </nav>

    <header>
        <h1>Next-Gen Templates</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search templates..." onkeypress="handleEnter(event)">
            <button onclick="searchMemes()">Search</button>
        </div>
    </div>

    <div class="categories" id="categoryBox">
        <button class="cat-btn active" onclick="setCategory('MemeTemplatesOfficial', '', this)">🔥 Trending</button>
        <button class="cat-btn" onclick="setCategory('IndianMemeTemplates', '', this)">🇮🇳 Indian Memes</button>
        <button class="cat-btn" onclick="setCategory('gamingmemes', 'template', this)">🎮 GTA & Gaming</button>
        <button class="cat-btn" onclick="setCategory('GymMemes', 'template', this)">🏋️ Gym & Fitness</button>
        <button class="cat-btn" onclick="setCategory('ProgrammerHumor', 'template', this)">💻 Tech & Coding</button>
        <button class="cat-btn" onclick="setCategory('IndianMemeTemplates', 'punjabi', this)">🎵 Punjabi Music</button>
    </div>

    <div class="container">
        <div class="page-loader" id="mainLoader"></div>
        <div id="meme-grid" class="masonry-grid"></div>
        <div class="load-more-container" id="loadMoreSection" style="display: none;">
            <button class="load-more-btn" id="loadBtn" onclick="fetchMemes()">Load More</button>
        </div>
    </div>

    <div id="toast">Message here</div>

    <script>
        // --- 1. THEME TOGGLE FEATURE ---
        function toggleTheme() {
            const body = document.body;
            if (body.getAttribute("data-theme") === "light") {
                body.removeAttribute("data-theme");
                showToast("🌙 Dark Mode Activated");
            } else {
                body.setAttribute("data-theme", "light");
                showToast("☀️ Light Mode Activated");
            }
        }

        // --- 2. TOAST NOTIFICATION FEATURE ---
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.innerText = message;
            toast.className = "show";
            setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
        }

        // --- 3. ROBUST API SYSTEM ---
        let afterToken = '';
        let isFetching = false;
        let currentQuery = '';
        let currentSubreddit = 'MemeTemplatesOfficial';

        function handleEnter(e) { if (e.key === 'Enter') searchMemes(); }

        function setCategory(subreddit, query, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');
            
            currentSubreddit = subreddit;
            currentQuery = query; // Kuch categories ke liye auto-search lagaya hai
            document.getElementById('searchInput').value = query === 'template' ? '' : query;
            
            afterToken = ''; 
            document.getElementById('meme-grid').innerHTML = ''; 
            fetchMemes();
        }

        function searchMemes() {
            currentQuery = document.getElementById('searchInput').value.trim();
            afterToken = ''; 
            document.getElementById('meme-grid').innerHTML = ''; 
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            fetchMemes();
        }

        async function fetchMemes() {
            if (isFetching) return;
            isFetching = true;
            
            const loadBtn = document.getElementById('loadBtn');
            const loader = document.getElementById('mainLoader');
            const grid = document.getElementById('meme-grid');
            
            if(afterToken === '') loader.style.display = 'block';
            if(afterToken !== '') loadBtn.innerText = "Loading...";

            try {
                let apiUrl = `https://www.reddit.com/r/${currentSubreddit}/hot.json?limit=50&after=${afterToken}`;
                if (currentQuery !== '') {
                    apiUrl = `https://www.reddit.com/r/${currentSubreddit}/search.json?q=${encodeURIComponent(currentQuery)}&restrict_sr=1&limit=50&after=${afterToken}`;
                }

                // ANTI-BLOCK SYSTEM: Trying multiple ways to fetch data
                let data = null;
                try {
                    const response = await fetch(apiUrl);
                    if(!response.ok) throw new Error("Blocked");
                    data = await response.json();
                } catch(e) {
                    console.log("Direct blocked, trying proxy...");
                    const proxyResponse = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`);
                    data = await proxyResponse.json();
                }
                
                afterToken = data.data.after; 
                const posts = data.data.children;
                let htmlContent = '';

                posts.forEach(post => {
                    const postData = post.data;
                    let title = postData.title;
                    if(title.length > 50) title = title.substring(0, 50) + "...";

                    if (postData.url && postData.url.match(/\.(jpeg|jpg|gif|png)$/)) {
                        let imageUrl = postData.url;
                        htmlContent += `
                        <div class="card">
                            <img src="${imageUrl}" loading="lazy" onclick="window.open('${imageUrl}', '_blank')">
                            <div class="card-content">
                                <h3>${title}</h3>
                                <div class="action-buttons">
                                    <button onclick="forceDownload('${imageUrl}', 'Meme_${postData.id}.jpg')" class="download-btn">Download</button>
                                    <button onclick="copyLink('${imageUrl}')" class="copy-btn">🔗 Copy</button>
                                </div>
                            </div>
                        </div>`;
                    }
                });

                if (htmlContent === '' && afterToken === null) {
                    showToast("No more templates found!");
                    document.getElementById('loadMoreSection').style.display = 'none';
                } else {
                    grid.innerHTML += htmlContent;
                    document.getElementById('loadMoreSection').style.display = 'block';
                }

            } catch (error) {
                showToast("Network busy. Falling back to safe mode...");
                // Emergency Fallback API agar Reddit puri tarah block kar de
                setTimeout(() => { isFetching = false; fetchEmergencyMemes(); }, 2000);
            } finally {
                isFetching = false;
                loader.style.display = 'none';
                loadBtn.innerText = "Load More Templates";
            }
        }

        // Emergency API
        async function fetchEmergencyMemes() {
            const grid = document.getElementById('meme-grid');
            const res = await fetch('https://api.imgflip.com/get_memes');
            const data = await res.json();
            let htmlContent = '';
            data.data.memes.slice(0, 30).forEach(meme => {
                htmlContent += `
                <div class="card">
                    <img src="${meme.url}" loading="lazy">
                    <div class="card-content">
                        <h3>${meme.name}</h3>
                        <div class="action-buttons">
                            <button onclick="forceDownload('${meme.url}', 'Meme.jpg')" class="download-btn">Download</button>
                            <button onclick="copyLink('${meme.url}')" class="copy-btn">🔗 Copy</button>
                        </div>
                    </div>
                </div>`;
            });
            grid.innerHTML += htmlContent;
            document.getElementById('loadMoreSection').style.display = 'none';
        }

        // --- 4. NEW FEATURE: COPY LINK ---
        function copyLink(url) {
            navigator.clipboard.writeText(url).then(() => {
                showToast("✅ Image Link Copied!");
            });
        }

        // --- 5. ENHANCED DOWNLOADER ---
        async function forceDownload(fileUrl, filename) {
            showToast("⏳ Downloading Template...");
            try {
                const proxyUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(fileUrl)}`;
                const response = await fetch(proxyUrl);
                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                showToast("✅ Download Complete!");
                
            } catch (error) {
                showToast("⚠️ Security Block! Opening image to save...");
                setTimeout(() => { window.open(fileUrl, '_blank'); }, 1500);
            }
        }

        // Start
        fetchMemes();
    </script>
</body>
</html>

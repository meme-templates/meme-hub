<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Pro | HD Images & Video Templates</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00e5ff; 
            --secondary: #b900ff; 
            --bg-dark: #050505;
            --card-bg: #121212;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); }
        
        nav {
            position: sticky; top: 0; z-index: 1000;
            background: rgba(5, 5, 5, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.6rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; letter-spacing: 1px; }
        .insta-link { color: var(--text-main); text-decoration: none; font-weight: 600; font-size: 0.9rem; border: 1px solid rgba(255,255,255,0.2); padding: 6px 16px; border-radius: 20px; transition: 0.3s; }
        .insta-link:hover { background: rgba(255,255,255,0.1); border-color: var(--primary); }

        header { text-align: center; padding: 40px 20px 10px; }
        header h1 { font-size: 2.5rem; font-weight: 800; margin-bottom: 10px; }
        
        .search-container { text-align: center; margin: 10px auto 20px; max-width: 650px; padding: 0 20px; }
        .search-box {
            display: flex; background: var(--card-bg); padding: 8px; border-radius: 40px; 
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-box input {
            flex-grow: 1; background: transparent; border: none; color: white;
            padding: 12px 20px; font-size: 1rem; outline: none;
        }
        .search-box button {
            background: linear-gradient(90deg, var(--secondary), var(--primary)); border: none; color: white; padding: 0 30px;
            border-radius: 35px; font-weight: 700; cursor: pointer; text-transform: uppercase;
        }

        /* Category Scroll Bar */
        .categories {
            display: flex; gap: 15px; padding: 10px 20px; margin-bottom: 30px;
            overflow-x: auto; max-width: 1400px; margin-left: auto; margin-right: auto;
            scrollbar-width: none;
        }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn {
            background: var(--card-bg); color: var(--text-muted); border: 1px solid rgba(255,255,255,0.1);
            padding: 10px 25px; border-radius: 25px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .cat-btn.active {
            background: rgba(0, 229, 255, 0.1); color: var(--primary); border-color: var(--primary);
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }
        .masonry-grid { column-count: 4; column-gap: 20px; margin-bottom: 50px; }
        @media (max-width: 1200px) { .masonry-grid { column-count: 3; } }
        @media (max-width: 900px) { .masonry-grid { column-count: 2; } }
        @media (max-width: 600px) { .masonry-grid { column-count: 1; } }

        .card { 
            background: var(--card-bg); border-radius: 16px; overflow: hidden; 
            margin-bottom: 20px; break-inside: avoid; border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.3s ease;
        }
        .card:hover { transform: translateY(-5px); border-color: rgba(0, 229, 255, 0.5); }
        .card img, .card video { width: 100%; display: block; object-fit: cover; max-height: 500px; background: #000; }
        
        .card-content { padding: 15px; }
        .card h3 { font-size: 0.95rem; margin-bottom: 15px; font-weight: 500; color: #ddd; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        
        .download-btn { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); 
            color: white; padding: 10px; border-radius: 8px; font-weight: 600; 
            cursor: pointer; width: 100%; transition: 0.3s; text-transform: uppercase;
        }
        .download-btn.video-btn { background: rgba(185, 0, 255, 0.2); border-color: var(--secondary); color: #fff; }
        .card:hover .download-btn { background: var(--primary); color: #000; }
        .card:hover .download-btn.video-btn { background: var(--secondary); color: #fff; }

        .load-more-container { text-align: center; margin-bottom: 80px; }
        .load-more-btn {
            background: transparent; color: var(--primary); border: 2px solid var(--primary);
            padding: 15px 40px; font-size: 1.1rem; font-weight: 700; border-radius: 30px; cursor: pointer;
        }
        #statusMessage { text-align: center; font-size: 1.1rem; color: var(--primary); margin: 20px 0; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Pro</div>
        <a href="https://instagram.com/the_script_7" target="_blank" class="insta-link">@the_script_7</a>
    </nav>

    <header>
        <h1>10,000+ Templates</h1>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search templates..." onkeypress="handleEnter(event)">
            <button onclick="searchMemes()">Search</button>
        </div>
    </div>

    <div class="categories" id="categoryBox">
        <button class="cat-btn active" onclick="setCategory('MemeTemplatesOfficial', 'Trending', this)">🔥 Trending</button>
        <button class="cat-btn" onclick="setCategory('IndianMemeTemplates', 'Indian', this)">🇮🇳 Indian Memes</button>
        <button class="cat-btn" onclick="setCategory('MemeTemplatesOfficial', 'Videos', this)">🎬 Video Templates</button>
        <button class="cat-btn" onclick="setCategory('DesiMemeTemplates', 'Bollywood', this)">🎭 Bollywood</button>
    </div>

    <div class="container">
        <div id="statusMessage"></div>
        <div id="meme-grid" class="masonry-grid"></div>
        <div class="load-more-container" id="loadMoreSection" style="display: none;">
            <button class="load-more-btn" id="loadBtn" onclick="fetchMemes()">Load More</button>
        </div>
    </div>

    <script>
        let afterToken = '';
        let isFetching = false;
        let currentQuery = '';
        let currentSubreddit = 'MemeTemplatesOfficial';
        let isVideoMode = false;

        function handleEnter(e) { if (e.key === 'Enter') searchMemes(); }

        function setCategory(subreddit, type, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            currentSubreddit = subreddit;
            isVideoMode = (type === 'Videos');
            
            afterToken = ''; 
            currentQuery = '';
            document.getElementById('searchInput').value = '';
            document.getElementById('meme-grid').innerHTML = ''; 
            fetchMemes();
        }

        function searchMemes() {
            currentQuery = document.getElementById('searchInput').value.trim();
            afterToken = ''; 
            document.getElementById('meme-grid').innerHTML = ''; 
            document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
            fetchMemes();
        }

        async function fetchMemes() {
            if (isFetching) return;
            isFetching = true;
            
            const status = document.getElementById('statusMessage');
            const loadBtn = document.getElementById('loadBtn');
            const grid = document.getElementById('meme-grid');
            
            status.innerText = "Bypassing Security & Loading Memes...";
            status.style.display = 'block';
            if(afterToken !== '') loadBtn.innerText = "Loading...";

            try {
                let apiUrl = `https://www.reddit.com/r/${currentSubreddit}/hot.json?limit=50&after=${afterToken}`;
                if (currentQuery !== '') {
                    apiUrl = `https://www.reddit.com/r/${currentSubreddit}/search.json?q=${encodeURIComponent(currentQuery)}&restrict_sr=1&limit=50&after=${afterToken}`;
                }

                // THE BULLETPROOF BYPASS METHOD
                const bypassUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(apiUrl)}`;
                const response = await fetch(bypassUrl);
                const proxyData = await response.json();
                
                // Parsing the actual Reddit JSON from inside the proxy response
                const data = JSON.parse(proxyData.contents);

                afterToken = data.data.after; 
                const posts = data.data.children;
                let htmlContent = '';

                posts.forEach(post => {
                    const postData = post.data;
                    let title = postData.title;
                    if(title && title.length > 60) title = title.substring(0, 60) + "...";

                    if (postData.is_video && postData.media && postData.media.reddit_video) {
                        let videoUrl = postData.media.reddit_video.fallback_url;
                        htmlContent += `
                        <div class="card">
                            <video src="${videoUrl}" controls loop muted preload="metadata"></video>
                            <div class="card-content">
                                <h3>${title}</h3>
                                <button onclick="masterDownload('${videoUrl}', 'Video_${postData.id}.mp4', this)" class="download-btn video-btn">Download Video</button>
                            </div>
                        </div>`;
                    } 
                    else if (!isVideoMode && postData.url && postData.url.match(/\.(jpeg|jpg|gif|png)$/i)) {
                        let imageUrl = postData.url;
                        htmlContent += `
                        <div class="card">
                            <img src="${imageUrl}" loading="lazy">
                            <div class="card-content">
                                <h3>${title}</h3>
                                <button onclick="masterDownload('${imageUrl}', 'Image_${postData.id}.jpg', this)" class="download-btn">Download HD</button>
                            </div>
                        </div>`;
                    }
                });

                if (htmlContent === '' && !afterToken) {
                    status.innerText = "No more templates found!";
                    document.getElementById('loadMoreSection').style.display = 'none';
                } else {
                    grid.innerHTML += htmlContent;
                    status.style.display = 'none';
                    document.getElementById('loadMoreSection').style.display = 'block';
                }

            } catch (error) {
                console.error("Fetch Error:", error);
                status.innerText = "Reddit blocked the request. Please wait 5 seconds and click Load More.";
                document.getElementById('loadMoreSection').style.display = 'block';
            } finally {
                isFetching = false;
                loadBtn.innerText = "Load More Templates";
            }
        }

        async function masterDownload(fileUrl, filename, btnElement) {
            const originalText = btnElement.innerText;
            btnElement.innerText = "Saving...";
            btnElement.style.opacity = "0.7";

            try {
                // Direct file fetch proxy
                const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(fileUrl)}`;
                const response = await fetch(proxyUrl);
                
                if(!response.ok) throw new Error("Download block");

                const blob = await response.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                
                document.body.removeChild(a);
                window.URL.revokeObjectURL(blobUrl);
                
                btnElement.innerText = "✅ DONE!";
                setTimeout(() => { btnElement.innerText = originalText; }, 2000);
                
            } catch (error) {
                // Failsafe
                alert("Mobile security blocked direct save! Opening file in a new tab, long-press to save.");
                window.open(fileUrl, '_blank');
                btnElement.innerText = originalText;
            } finally {
                btnElement.style.opacity = "1";
            }
        }

        // Run on load
        fetchMemes();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemeHub Ultra | Infinite Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #ff3366;
            --secondary: #ff9933;
            --bg-dark: #09090b;
            --card-bg: #18181b;
            --text-main: #ffffff;
            --border: rgba(255,255,255,0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-main); overflow-x: hidden; }
        
        /* Glassmorphism Nav */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 1000;
            background: rgba(9, 9, 11, 0.85); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border);
            padding: 15px 5%; display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-size: 1.8rem; font-weight: 800; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; color: transparent; }
        .insta-btn { background: transparent; border: 1px solid var(--primary); color: var(--text-main); padding: 8px 20px; border-radius: 25px; text-decoration: none; font-weight: 600; transition: 0.3s; }
        .insta-btn:hover { background: var(--primary); color: #000; box-shadow: 0 0 15px rgba(255,51,102,0.4); }

        header { text-align: center; padding: 120px 20px 30px; }
        header h1 { font-size: 3.5rem; font-weight: 800; margin-bottom: 10px; line-height: 1.2; }
        header p { color: #a1a1aa; font-size: 1.2rem; }

        /* Modern Search Box */
        .search-container { max-width: 700px; margin: 0 auto 30px; padding: 0 20px; }
        .search-box { display: flex; background: var(--card-bg); border-radius: 50px; padding: 5px; border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .search-box input { flex-grow: 1; background: transparent; border: none; color: white; padding: 15px 25px; font-size: 1.1rem; outline: none; }
        .search-box button { background: linear-gradient(90deg, var(--primary), var(--secondary)); border: none; color: white; padding: 0 40px; border-radius: 40px; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .search-box button:hover { opacity: 0.9; transform: scale(0.98); }

        /* Category Scroll */
        .category-wrapper { position: sticky; top: 70px; z-index: 990; background: rgba(9, 9, 11, 0.95); padding: 15px 0; border-bottom: 1px solid var(--border); }
        .categories { display: flex; gap: 12px; overflow-x: auto; max-width: 1400px; margin: 0 auto; padding: 0 20px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: var(--card-bg); color: #fff; border: 1px solid var(--border); padding: 10px 25px; border-radius: 30px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.3s; font-size: 0.95rem; }
        .cat-btn.active { background: var(--primary); color: #000; border: none; box-shadow: 0 5px 15px rgba(255,51,102,0.3); }

        /* Masonry Grid */
        .container { max-width: 1400px; margin: 30px auto; padding: 0 20px; }
        .grid { column-count: 4; column-gap: 20px; }
        @media (max-width: 1200px) { .grid { column-count: 3; } }
        @media (max-width: 900px) { .grid { column-count: 2; } }
        @media (max-width: 600px) { .grid { column-count: 1; } }

        .card { background: var(--card-bg); border-radius: 16px; overflow: hidden; margin-bottom: 20px; break-inside: avoid; border: 1px solid var(--border); position: relative; cursor: pointer; transition: all 0.3s; }
        .card:hover { border-color: var(--primary); transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .card img, .card video { width: 100%; display: block; object-fit: cover; background: #000; min-height: 200px; }
        .play-icon { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 3rem; color: rgba(255,255,255,0.8); pointer-events: none; text-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .card-content { padding: 15px; position: absolute; bottom: 0; width: 100%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); }
        .card h3 { font-size: 0.95rem; font-weight: 600; color: #fff; text-shadow: 1px 1px 3px #000; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 10px;}
        
        .quick-actions { display: flex; gap: 10px; }
        .q-btn { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border: none; color: white; padding: 8px; border-radius: 8px; font-weight: 600; cursor: pointer; flex-grow: 1; transition: 0.3s; font-size: 0.8rem; text-transform: uppercase; }
        .q-btn:hover { background: var(--primary); color: #000; }

        /* Skeleton Loader */
        .skeleton-card { background: var(--card-bg); border-radius: 16px; height: 300px; margin-bottom: 20px; break-inside: avoid; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { background-color: #18181b; } 50% { background-color: #27272a; } 100% { background-color: #18181b; } }
        
        #loading-trigger { text-align: center; padding: 20px; color: var(--primary); font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">MemeHub Ultra</div>
        <a href="https://instagram.com/the_script_7" target="_blank" class="insta-btn">@the_script_7</a>
    </nav>

    <header>
        <h1>Unlimited Creation</h1>
        <p>No Repeats. Infinite Scroll. Unlimited HD Videos.</p>
    </header>

    <div class="search-container">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search template..." onkeypress="handleEnter(event)">
            <button onclick="searchMemes()">Search</button>
        </div>
    </div>

    <div class="category-wrapper">
        <div class="categories">
            <button class="cat-btn active" onclick="switchCategory('MemeTemplatesOfficial', 'image', this)">🔥 Trending Images</button>
            <button class="cat-btn" onclick="switchCategory('MemeTemplatesOfficial', 'video', this)">🎬 Unlimited Videos</button>
            <button class="cat-btn" onclick="switchCategory('IndianMemeTemplates', 'image', this)">🇮🇳 Indian Memes</button>
            <button class="cat-btn" onclick="switchCategory('DesiVideoMemes', 'video', this)">🎞️ Desi Videos</button>
        </div>
    </div>

    <div class="container">
        <div id="meme-grid" class="grid"></div>
        <div id="loading-trigger">⏳ Fetching more unique templates...</div>
    </div>

    <script>
        const grid = document.getElementById('meme-grid');
        const trigger = document.getElementById('loading-trigger');
        
        let currentMode = 'image'; // 'image' or 'video'
        let currentSubreddit = 'MemeTemplatesOfficial';
        let searchQuery = '';
        let afterToken = '';
        let isFetching = false;
        
        // ==========================================
        // DUPLICATE KILLER: Memory Set
        // ==========================================
        let seenMemes = new Set(); 

        function handleEnter(e) { if (e.key === 'Enter') searchMemes(); }

        function searchMemes() {
            searchQuery = document.getElementById('searchInput').value.trim();
            resetEngine();
        }

        function switchCategory(target, mode, btnElement) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btnElement.classList.add('active');
            
            currentSubreddit = target;
            currentMode = mode;
            searchQuery = '';
            document.getElementById('searchInput').value = '';
            resetEngine();
        }

        function resetEngine() {
            grid.innerHTML = '';
            seenMemes.clear(); // Nayi search par memory clear
            afterToken = '';
            fetchData();
        }

        async function fetchData() {
            if (isFetching) return;
            isFetching = true;
            trigger.style.display = 'block';

            try {
                let apiUrl = '';
                
                // Advanced Reddit API Routing
                if (searchQuery !== '') {
                    // Search with video filter if needed
                    let q = currentMode === 'video' ? `${searchQuery} flair:video` : searchQuery;
                    apiUrl = `https://www.reddit.com/r/${currentSubreddit}/search.json?q=${encodeURIComponent(q)}&restrict_sr=1&limit=50&after=${afterToken}`;
                } else {
                    if (currentMode === 'video') {
                        // Trick to get only videos from the subreddit
                        apiUrl = `https://www.reddit.com/r/${currentSubreddit}/search.json?q=is_video:true&restrict_sr=1&sort=hot&limit=50&after=${afterToken}`;
                    } else {
                        apiUrl = `https://www.reddit.com/r/${currentSubreddit}/hot.json?limit=50&after=${afterToken}`;
                    }
                }

                // Proxy Fallback for Mobile Data Blocks
                let response;
                try {
                    response = await fetch(apiUrl);
                    if (!response.ok) throw new Error("Blocked");
                } catch(err) {
                    response = await fetch(`https://api.allorigins.win/raw?url=${encodeURIComponent(apiUrl)}`);
                }
                
                const data = await response.json();
                afterToken = data.data.after;
                const posts = data.data.children;
                
                let html = '';
                let addedCount = 0;

                posts.forEach(post => {
                    const postData = post.data;
                    const postId = postData.id;
                    
                    // Duplicate Killer Engine: Agar pehle dikh chuka hai toh Skip kar do!
                    if (seenMemes.has(postId)) return;

                    let title = postData.title.replace(/'/g, "\\'");
                    if(title.length > 50) title = title.substring(0, 50) + "...";

                    if (currentMode === 'video' && postData.is_video && postData.media && postData.media.reddit_video) {
                        seenMemes.add(postId); // Yaad rakh liya
                        addedCount++;
                        let videoUrl = postData.media.reddit_video.fallback_url;
                        
                        html += `
                        <div class="card">
                            <video src="${videoUrl}" muted loop preload="metadata" onmouseover="this.play()" onmouseout="this.pause()"></video>
                            <div class="play-icon">▶</div>
                            <div class="card-content">
                                <h3>${title}</h3>
                                <div class="quick-actions">
                                    <button class="q-btn" onclick="window.open('${videoUrl}', '_blank')">⬇ Save</button>
                                </div>
                            </div>
                        </div>`;
                    } 
                    else if (currentMode === 'image' && postData.url && postData.url.match(/\.(jpeg|jpg|png)$/)) {
                        seenMemes.add(postId); // Yaad rakh liya
                        addedCount++;
                        let imgUrl = postData.url;
                        
                        html += `
                        <div class="card">
                            <img src="${imgUrl}" loading="lazy">
                            <div class="card-content">
                                <h3>${title}</h3>
                                <div class="quick-actions">
                                    <button class="q-btn" onclick="window.open('${imgUrl}', '_blank')">⬇ HD</button>
                                    <button class="q-btn" onclick="navigator.clipboard.writeText('${imgUrl}'); alert('Copied!');">🔗 Copy</button>
                                </div>
                            </div>
                        </div>`;
                    }
                });

                grid.innerHTML += html;

                // Agar API ne posts diye par filter mein sab kat gaye (ya end aagaya)
                if (afterToken === null) {
                    trigger.innerText = "No more templates found!";
                } else if (addedCount === 0) {
                    // Agar duplicates nikalne ke baad kuch nahi bacha, toh auto-fetch next page
                    isFetching = false; 
                    fetchData();
                }

            } catch (error) {
                console.error(error);
                trigger.innerText = "Network Error. Please refresh.";
            } finally {
                isFetching = false;
            }
        }

        // ==========================================
        // PRO INTERSECTION OBSERVER (Auto Load Trigger)
        // ==========================================
        const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting && afterToken !== null) {
                fetchData();
            }
        }, { threshold: 0.1 });

        observer.observe(trigger); // Jab bhi "Fetching more" screen par aayega, API chal padegi

    </script>
</body>
</html>
